<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>感染制御認定薬剤師 試験対策クイズ</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222536;
    --border: #2e3248;
    --accent: #4f8ef7;
    --accent2: #7c5cbf;
    --correct: #2ecc71;
    --wrong: #e74c3c;
    --text: #e8eaf0;
    --text2: #9099b5;
    --text3: #6b7394;
    --warn: #f39c12;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', 'Yu Gothic', sans-serif;
    min-height: 100vh;
    line-height: 1.6;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #1a1d27 0%, #151829 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .header h1 {
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.05em;
    flex: 1;
    min-width: 200px;
  }
  .stats-bar {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .stat-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--text2);
  }
  .stat-pill span { color: var(--text); font-weight: 700; }
  .progress-wrap {
    width: 120px;
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  /* Controls */
  .controls {
    padding: 16px 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .filter-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-label {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }
  select, input[type="text"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  select:focus, input:focus { border-color: var(--accent); }
  .btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    white-space: nowrap;
  }
  .btn:hover { background: var(--border); border-color: var(--accent); color: var(--accent); }
  .btn-accent {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    font-weight: 700;
  }
  .btn-accent:hover { background: #3a7de0; border-color: #3a7de0; color: white; }

  /* Question list */
  .question-list {
    padding: 20px;
    display: grid;
    gap: 16px;
    max-width: 900px;
    margin: 0 auto;
  }

  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .q-card:hover { border-color: #3a4060; }
  .q-card.answered-correct { border-color: rgba(46,204,113,0.4); }
  .q-card.answered-wrong { border-color: rgba(231,76,60,0.3); }

  .q-header {
    padding: 14px 18px 10px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .q-num {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text3);
    font-size: 11px;
    font-weight: 700;
    border-radius: 4px;
    padding: 2px 8px;
    white-space: nowrap;
    margin-top: 2px;
  }
  .q-chapter {
    font-size: 11px;
    color: var(--accent2);
    background: rgba(124,92,191,0.12);
    border: 1px solid rgba(124,92,191,0.3);
    border-radius: 4px;
    padding: 2px 8px;
    white-space: nowrap;
    margin-top: 2px;
  }
  .q-diff {
    font-size: 11px;
    margin-left: auto;
    margin-top: 2px;
  }
  .q-status {
    font-size: 13px;
    margin-left: 4px;
  }

  .q-text {
    padding: 0 18px 14px;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
  }

  .choices {
    padding: 0 18px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .choice-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    border-radius: 8px;
    padding: 9px 14px;
    font-size: 13px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    line-height: 1.5;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .choice-btn:hover:not(:disabled) {
    background: rgba(79,142,247,0.08);
    border-color: rgba(79,142,247,0.4);
    color: var(--text);
  }
  .choice-btn:disabled { cursor: default; }
  .choice-btn.correct {
    background: rgba(46,204,113,0.12);
    border-color: rgba(46,204,113,0.5);
    color: #2ecc71;
    font-weight: 700;
  }
  .choice-btn.wrong {
    background: rgba(231,76,60,0.1);
    border-color: rgba(231,76,60,0.4);
    color: #e74c3c;
  }
  .choice-btn.reveal-correct {
    background: rgba(46,204,113,0.07);
    border-color: rgba(46,204,113,0.3);
    color: #2ecc71;
  }
  .choice-num {
    font-weight: 700;
    min-width: 18px;
    color: var(--text3);
  }
  .choice-btn.correct .choice-num,
  .choice-btn.wrong .choice-num,
  .choice-btn.reveal-correct .choice-num { color: inherit; }

  .explanation {
    display: none;
    padding: 12px 18px 16px;
    border-top: 1px solid var(--border);
    font-size: 13px;
    line-height: 1.7;
    color: var(--text2);
  }
  .explanation.show { display: block; }
  .explanation strong { color: var(--correct); }
  .explanation .result-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .result-badge.ok { background: rgba(46,204,113,0.15); color: #2ecc71; }
  .result-badge.ng { background: rgba(231,76,60,0.15); color: #e74c3c; }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
    font-size: 14px;
  }

  /* Tab area for chapter filter */
  .chapter-tabs {
    padding: 12px 20px 0;
    display: flex;
    gap: 4px;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    scrollbar-width: none;
  }
  .chapter-tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    padding: 8px 14px;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    font-family: inherit;
    font-weight: 500;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
</style>
</head>

<div class="header">

  <div class="stats-bar">

<div class="chapter-tabs" id="chapterTabs"></div>

<div class="controls">
  <div class="filter-group">

  </div>
  <div class="filter-group">
    <input type="text" id="searchInput" placeholder="キーワード検索..." style="width:180px">
  </div>
  <button class="btn btn-accent" onclick="shuffle()">🔀 シャッフル</button>
  <button class="btn" onclick="resetAll()">↺ リセット</button>
</div>

<div class="question-list" id="questionList"></div>

];

// State
let state = {};
let displayOrder = QUESTIONS.map((_, i) => i);
let currentChapter = "all";

function initState() {
  QUESTIONS.forEach(q => {
    if (!state[q.id]) state[q.id] = { answered: false, correct: null };
  });
}

function getChapters() {
  const chapters = ["all", ...new Set(QUESTIONS.map(q => q.chapter))];
  return chapters;
}

function renderTabs() {
  const tabs = document.getElementById("chapterTabs");
  const chapters = getChapters();
  tabs.innerHTML = chapters.map(ch => {
    const label = ch === "all" ? "すべて" : ch;
    const count = ch === "all" ? QUESTIONS.length : QUESTIONS.filter(q => q.chapter === ch).length;
    return `<button class="tab-btn ${currentChapter === ch ? 'active' : ''}" onclick="setChapter('${ch}')">${label} (${count})</button>`;
  }).join("");
}

function setChapter(ch) {
  currentChapter = ch;
  renderTabs();
  renderQuestions();
}

function getFilteredQuestions() {
  const status = document.getElementById("statusFilter").value;
  const diff = document.getElementById("diffFilter").value;
  const search = document.getElementById("searchInput").value.toLowerCase();

  return displayOrder.map(i => QUESTIONS[i]).filter(q => {
    if (currentChapter !== "all" && q.chapter !== currentChapter) return false;
    const s = state[q.id];
    if (status === "unanswered" && s.answered) return false;
    if (status === "correct" && (!s.answered || !s.correct)) return false;
    if (status === "wrong" && (!s.answered || s.correct)) return false;
    if (diff !== "all" && q.difficulty !== parseInt(diff)) return false;
    if (search && !q.text.toLowerCase().includes(search) && !q.section.toLowerCase().includes(search)) return false;
    return true;
  });
}

function updateStats() {
  const total = QUESTIONS.length;
  const answered = Object.values(state).filter(s => s.answered).length;
  const correct = Object.values(state).filter(s => s.answered && s.correct).length;
  document.getElementById("totalCount").textContent = total;
  document.getElementById("correctCount").textContent = correct;
  document.getElementById("accuracy").textContent = answered > 0 ? Math.round(correct / answered * 100) + "%" : "-";
  document.getElementById("progressFill").style.width = (answered / total * 100) + "%";
}

function renderQuestions() {
  const list = document.getElementById("questionList");
  const filtered = getFilteredQuestions();
  document.getElementById("totalCount").textContent = QUESTIONS.length;

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">該当する問題がありません</div>';
    return;
  }

  list.innerHTML = filtered.map(q => renderCard(q)).join("");
}

function renderCard(q) {
  const s = state[q.id];
  const cardClass = s.answered ? (s.correct ? "answered-correct" : "answered-wrong") : "";
  const statusIcon = s.answered ? (s.correct ? "✅" : "❌") : "";
  const diffStars = "★".repeat(q.difficulty) + "☆".repeat(5 - q.difficulty);

  const choicesHtml = q.choices.map((c, i) => {
    let cls = "";
    if (s.answered) {
      if (i === q.answer) cls = s.correct ? "correct" : "reveal-correct";
      else if (i === s.chosen) cls = "wrong";
    }
    return `<button class="choice-btn ${cls}" ${s.answered ? "disabled" : ""} onclick="answer(${q.id}, ${i})">
      <span class="choice-num">${i + 1}.</span><span>${c}</span>
    </button>`;
  }).join("");

  const explHtml = s.answered ? `<div class="explanation show">
    <span class="result-badge ${s.correct ? 'ok' : 'ng'}">${s.correct ? '✓ 正解' : '✗ 不正解'}</span>
    <div>${q.explanation}</div>
  </div>` : `<div class="explanation"></div>`;

  return `<div class="q-card ${cardClass}" id="card-${q.id}">
    <div class="q-header">
      <span class="q-num">問${q.id}</span>
      <span class="q-chapter">${q.chapter}</span>
      <span class="q-diff" style="color:var(--warn)">${diffStars}</span>
      <span class="q-status">${statusIcon}</span>
    </div>
    <div class="q-text">${q.text}</div>
    <div class="choices">${choicesHtml}</div>
    ${explHtml}
  </div>`;
}

function answer(qId, chosen) {
  const q = QUESTIONS.find(x => x.id === qId);
  if (!q || state[qId].answered) return;
  state[qId] = { answered: true, correct: chosen === q.answer, chosen };
  updateStats();

  // Re-render just this card
  const card = document.getElementById(`card-${qId}`);
  if (card) {
    const s = state[qId];
    // Update card class
    card.className = "q-card " + (s.correct ? "answered-correct" : "answered-wrong");
    // Update status icon
    card.querySelector(".q-status").textContent = s.correct ? "✅" : "❌";
    // Update choice buttons
    const btns = card.querySelectorAll(".choice-btn");
    btns.forEach((btn, i) => {
      btn.disabled = true;
      if (i === q.answer) btn.className = "choice-btn " + (s.correct ? "correct" : "reveal-correct");
      else if (i === chosen) btn.className = "choice-btn wrong";
    });
    // Show explanation
    const expl = card.querySelector(".explanation");
    expl.innerHTML = `<span class="result-badge ${s.correct ? 'ok' : 'ng'}">${s.correct ? '✓ 正解' : '✗ 不正解'}</span><div>${q.explanation}</div>`;
    expl.classList.add("show");
  }
}

function shuffle() {
  for (let i = displayOrder.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [displayOrder[i], displayOrder[j]] = [displayOrder[j], displayOrder[i]];
  }
  renderQuestions();
}

function resetAll() {
  if (!confirm("すべての回答履歴をリセットしますか？")) return;
  QUESTIONS.forEach(q => { state[q.id] = { answered: false, correct: null }; });
  displayOrder = QUESTIONS.map((_, i) => i);
  updateStats();
  renderQuestions();
}

// Event listeners
document.getElementById("statusFilter").addEventListener("change", renderQuestions);
document.getElementById("diffFilter").addEventListener("change", renderQuestions);
document.getElementById("searchInput").addEventListener("input", renderQuestions);

// Init
initState();
updateStats();
renderTabs();
renderQuestions();
</script>
</body>
</html>
